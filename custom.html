<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Cakes | Velvet Bakes - Bespoke Whole Wheat Designs</title>
    <meta name="description"
        content="Order bespoke, Maida-free custom cakes in Butwal & Bhairahawa. Choose your flavor, weight, and design.">

    <!-- Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@300;400;600&family=Great+Vibes&display=swap"
        rel="stylesheet">

    <!-- Unified Styles -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div id="sidebar-overlay" onclick="toggleCart()"></div>

    <header>
        <div class="container nav-content">
            <a href="index.html" class="brand-logo">
                <span class="brand-name">Velvet Bakes</span>
            </a>

            <div class="nav-controls">
                <nav class="nav-links">
                    <a href="index.html">Home</a>
                    <a href="menu.html">Menu</a>
                    <a href="custom.html" class="active">Custom Cakes</a>
                    <a href="about.html">About</a>
                    <a href="contact.html">Contact</a>
                </nav>

                <div class="cart-trigger" onclick="toggleCart()">
                    🛒 <span id="cart-count">0</span>
                </div>

                <div class="hamburger">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            </div>
        </div>
    </header>

    <main class="section-padding">
        <div class="container">
            <div class="text-center" style="margin-bottom: 50px;">
                <h1 style="font-size: 42px;">Bespoke Creations</h1>
                <p style="color: var(--text-muted);">Tell us about your dream cake, stone-ground in whole wheat.</p>
            </div>

            <div
                style="background: var(--card-bg); padding: 30px; border: 1px solid rgba(197, 160, 89, 0.1); max-width: 800px; margin: 0 auto;">
                <form id="custom-cake-form">
                    <div class="grid-responsive" style="margin-bottom: 15px;">
                        <div>
                            <label
                                style="display:block; font-size:11px; text-transform:uppercase; color:var(--accent-gold); margin-bottom:8px; font-weight:700;">Base
                                Flavor</label>
                            <select id="cake-flavor" required>
                                <option value="Dark Cocoa Wheat">Dark Cocoa Wheat</option>
                                <option value="Saffron Cardamom">Saffron Cardamom</option>
                                <option value="Honey Almond Atta">Honey Almond Atta</option>
                                <option value="Vanilla Bean Whole Wheat">Vanilla Bean Whole Wheat</option>
                            </select>
                        </div>
                        <div>
                            <label
                                style="display:block; font-size:11px; text-transform:uppercase; color:var(--accent-gold); margin-bottom:8px; font-weight:700;">Desired
                                Weight</label>
                            <select id="cake-weight" required>
                                <option value="1 kg">1 kg (Standard)</option>
                                <option value="2 kg">2 kg (Large)</option>
                                <option value="0.5 kg">0.5 kg (Small)</option>
                            </select>
                        </div>
                    </div>

                    <div class="grid-responsive" style="margin-bottom: 15px;">
                        <div>
                            <label
                                style="display:block; font-size:11px; text-transform:uppercase; color:var(--accent-gold); margin-bottom:8px; font-weight:700;">Occasion
                                Date</label>
                            <input type="date" id="event-date" required>
                        </div>
                        <div>
                            <label
                                style="display:block; font-size:11px; text-transform:uppercase; color:var(--accent-gold); margin-bottom:8px; font-weight:700;">Message
                                on Cake</label>
                            <input type="text" id="cake-message" placeholder="Happy Birthday...">
                        </div>
                    </div>

                    <label
                        style="display:block; font-size:11px; text-transform:uppercase; color:var(--accent-gold); margin-bottom:8px; font-weight:700;">Design
                        Notes</label>
                    <textarea id="design-notes" style="height: 120px;"
                        placeholder="Colors, themes, dietary needs..."></textarea>

                    <button type="button" class="btn-premium" onclick="sendCustomInquiry()">Submit Design
                        Inquiry</button>
                </form>
            </div>
        </div>
    </main>

    <!-- Cart Sidebar -->
    <div id="cart-sidebar">
        <!-- Same Sidebar Structure -->
        <div class="sidebar-header">
            <h2>Your Basket</h2>
            <div onclick="toggleCart()" style="font-size:30px; cursor:pointer;">&times;</div>
        </div>
        <div id="cart-items"></div>
        <div class="cart-summary">
            <div class="summary-row"><span>Subtotal</span><span>NPR <span id="cart-subtotal">0</span></span></div>
            <div class="summary-row total"><span>Total</span><span>NPR <span id="cart-total">0</span></span></div>
        </div>
        <div class="checkout-form">
            <input type="text" id="cust-name" placeholder="Full Name">
            <input type="text" id="cust-address" placeholder="Delivery Address">
            <button class="btn-premium" onclick="handleCheckout()">Checkout via WhatsApp</button>
        </div>
    </div>

    <footer>
        <div class="container text-center">
            <p style="font-size: 10px; color: #555;">&copy; 2026 VELVET BAKES. THE WHOLE WHEAT REVOLUTION.</p>
        </div>
    </footer>

    <!-- Unified Script -->
    <script src="js/script.js"></script>
</body>

</html>
